# ------------------------------------------------------------------------------
# YOLOv8 自定义数据集配置文件：检测"仪表"和"指针"两类目标
# 核心作用：告诉YOLOv8 数据集位置、类别数量及名称
# ------------------------------------------------------------------------------

# 1. 数据集根路径（关键！需替换为你的数据集实际根目录）
# 建议格式：数据集根目录下分 images（存图像）和 labels（存标注txt），符合YOLO标准结构
path: D:/meter dection/meter dection dataset/data_detection  # Linux路径示例
# path: D:\datasets\meter_dataset                  # Windows路径示例（注意用反斜杠或双正斜杠）

# 2. 训练集/验证集 图像路径（相对path的路径，或绝对路径）
# 若你的图像直接放在 path/images/train 下，按如下配置；若路径不同需同步修改
train: D:/meter dection/meter dection dataset/data_detection/images/train  # 训练集图像目录（需包含所有训练图像，格式：jpg/png等）
val: D:/meter dection/meter dection dataset/data_detection/images/val      # 验证集图像目录（需包含所有验证图像，格式与训练集一致）
# test: images/test   # （可选）测试集图像目录，若有测试集可取消注释并补充路径

# 3. 数据集基本信息（类别相关）
nc: 2                # number of classes（类别数量："仪表"+"指针"共2类）
names:               # 类别名称与索引对应（索引0/1需与标注文件中的类别编号完全一致！）
  0: dig           # 类别0：仪表（标注文件中"仪表"的类别编号需为0）
  1: pointer         # 类别1：指针（标注文件中"指针"的类别编号需为1）

# 4. 可选配置（非必须，可在训练命令中覆盖，此处为统一管理添加）
# batch: 16           # 训练批次大小（根据GPU显存调整，显存不足改小，如8；显存充足改大，如32）
# imgsz: 640          # 训练图像尺寸（YOLOv8默认640，建议为32的倍数，如480、640、800）
# rect: false         # 是否使用矩形训练（加速训练，默认false，小数据集可开启为true）

# 5. 标注文件说明（重要！确保标注格式与YOLO匹配）
# 标注文件需放在：path/labels/train（训练集标注）和 path/labels/val（验证集标注）
# 标注文件格式：每个图像对应1个同名.txt文件，每行代表1个目标，格式为：
# <类别编号> <x_center> <y_center> <width> <height> （坐标已归一化，范围0-1）
# 示例（某图像的标注txt内容）：
# 0 0.52 0.48 0.8 0.76  # 类别0（仪表）的归一化坐标
# 1 0.51 0.32 0.05 0.38 # 类别1（指针）的归一化坐标